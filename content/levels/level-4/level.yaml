id: level-4
title: Level 4
theme: Fractions, Decimals, and Data Dash
passingRule: perfect
questions:
  - id: level-4-q1
    prompt: Which fraction is equivalent to 3/5?
    topicTags:
      - fractions
      - equivalent-fractions
    hint: Multiply the numerator and denominator by the same number.
    figure: null
    options:
      - id: a
        text: 5/8
      - id: b
        text: 6/12
      - id: c
        text: 6/10
      - id: d
        text: 9/20
    correctOptionId: c
  - id: level-4-q2
    prompt: What decimal is equal to 7/10?
    topicTags:
      - fractions
      - decimals
      - conversion
    hint: A denominator of 10 tells you the tenths place.
    figure: null
    options:
      - id: a
        text: "0.07"
      - id: b
        text: "0.7"
      - id: c
        text: "7.0"
      - id: d
        text: "0.17"
    correctOptionId: b
  - id: level-4-q3
    prompt: What is 4.8 + 1.35?
    topicTags:
      - decimals
      - addition
    hint: Line up the decimal points before adding.
    figure: null
    options:
      - id: a
        text: "5.15"
      - id: b
        text: "6.05"
      - id: c
        text: "6.15"
      - id: d
        text: "6.85"
    correctOptionId: c
  - id: level-4-q4
    prompt: What is 9.4 − 2.76?
    topicTags:
      - decimals
      - subtraction
    hint: Write 9.4 as 9.40 so the place values match.
    figure: null
    options:
      - id: a
        text: "6.24"
      - id: b
        text: "6.64"
      - id: c
        text: "7.14"
      - id: d
        text: "7.66"
