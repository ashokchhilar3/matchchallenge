  - id: level-4-q5
    prompt: According to the bar graph, how many books were read on Wednesday?
    topicTags:
      - data
      - bar-graph
      - reading-data
    hint: Look at the height of the Wednesday bar and match it to the scale.
    figure:
      file: figures/level-4-q5-bar-graph.svg
      alt: A bar graph showing books read on Monday 12, Tuesday 16, Wednesday 20, and Thursday 14.
    options:
      - id: a
        text: 16 books
      - id: b
        text: 18 books
      - id: c
        text: 20 books
      - id: d
        text: 24 books
    correctOptionId: c
  - id: level-4-q6
    prompt: Which fraction is equal to 0.25?
    topicTags:
      - fractions
      - decimals
      - conversion
    hint: Think of 0.25 as twenty-five hundredths and simplify.
    figure: null
    options:
      - id: a
        text: 1/2
      - id: b
        text: 1/4
      - id: c
        text: 2/5
      - id: d
        text: 3/10
    correctOptionId: b
  - id: level-4-q7
    prompt: A snack mix recipe uses 0.5 cup of raisins and 1.25 cups of cereal. How many cups are used in all?
    topicTags:
      - decimals
      - word-problem
      - addition
    hint: Add the tenths and hundredths carefully.
    figure: null
    options:
      - id: a
        text: 1.3 cups
      - id: b
        text: 1.7 cups
      - id: c
        text: 1.75 cups
      - id: d
        text: 2.15 cups
    correctOptionId: c
  - id: level-4-q8
    prompt: A ribbon is 3/4 yard long. If each piece is 1/8 yard long, how many pieces can be cut?
    topicTags:
      - fractions
      - division
      - word-problem
    hint: How many eighths are in three fourths?
    figure: null
    options:
      - id: a
        text: "4"
      - id: b
        text: "5"
      - id: c
        text: "6"
      - id: d
        text: "8"
    correctOptionId: c
  - id: level-4-q9
    prompt: A runner jogged 1.2 miles on Monday and 2.35 miles on Tuesday. How far did the runner jog altogether?
    topicTags:
      - decimals
      - word-problem
      - addition
    hint: Rewrite 1.2 as 1.20 before adding.
    figure: null
    options:
      - id: a
        text: 3.45 miles
      - id: b
        text: 3.55 miles
      - id: c
        text: 3.65 miles
      - id: d
        text: 4.55 miles
    correctOptionId: b
  - id: level-4-q10
    prompt: >-
      A class collected 2.4 pounds of paper on Monday and 1.85 pounds on Tuesday. How much more than 4 pounds is that
      total?
    topicTags:
      - decimals
      - word-problem
      - multi-step
    hint: Add the two amounts first, then compare the total to 4 pounds.
    figure: null
    options:
      - id: a
        text: 0.15 pound
      - id: b
        text: 0.25 pound
      - id: c
        text: 0.35 pound
      - id: d
        text: 0.45 pound
    correctOptionId: b
