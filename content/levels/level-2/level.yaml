id: level-2
title: Level 2
theme: Geometry and Measurement Mission
passingRule: perfect
questions:
  - id: level-2-q1
    prompt: What is the area of this rectangle?
    topicTags:
      - geometry
      - area
      - rectangle
    hint: Area of a rectangle = length × width.
    figure:
      file: figures/level-2-q1-rectangle-area.svg
      alt: A rectangle labeled 8 centimeters across and 5 centimeters tall.
    options:
      - id: a
        text: 26 cm²
      - id: b
        text: 40 cm²
      - id: c
        text: 13 cm²
      - id: d
        text: 80 cm²
    correctOptionId: b
  - id: level-2-q2
    prompt: Find the missing angle marked with ? in this triangle.
    topicTags:
      - geometry
      - angles
      - triangle
    hint: All angles in a triangle add up to 180°.
    figure:
      file: figures/level-2-q2-triangle-angle.svg
      alt: A triangle with bottom angles labeled 60 degrees and 70 degrees, and the top angle labeled with a question mark.
    options:
      - id: a
        text: 40°
      - id: b
        text: 50°
      - id: c
        text: 60°
      - id: d
        text: 130°
    correctOptionId: b
  - id: level-2-q3
    prompt: A garden path is 12 meters long and 7 meters wide. What is its perimeter?
    topicTags:
      - measurement
      - perimeter
    hint: Add all four sides, or use 2 × (length + width).
    figure: null
    options:
      - id: a
        text: 19 meters
      - id: b
        text: 38 meters
      - id: c
        text: 84 meters
      - id: d
        text: 24 meters
    correctOptionId: b
  - id: level-2-q4
    prompt: Find the area of this L-shaped figure.
    topicTags:
      - geometry
      - area
      - composite-shapes
    hint: Split the shape into two rectangles and add their areas.
    figure:
      file: figures/level-2-q4-l-shape-area.svg
      alt: >-
        An L-shaped figure with labeled side lengths of 7 centimeters, 11 centimeters, 7 centimeters, and 4 centimeters
        for the top step.
    options:
      - id: a
        text: 93 cm²
      - id: b
        text: 105 cm²
      - id: c
        text: 121 cm²
      - id: d
        text: 77 cm²
    correctOptionId: b
  - id: level-2-q5
    prompt: How many centimeters are in 2.5 meters?
    topicTags:
      - measurement
      - unit-conversion
    hint: 1 meter = 100 centimeters.
    figure: null
    options:
      - id: a
        text: 25 cm
      - id: b
        text: 205 cm
      - id: c
        text: 250 cm
      - id: d
        text: 2,500 cm
    correctOptionId: c
  - id: level-2-q6
    prompt: What type of angle is shown in this figure?
    topicTags:
      - geometry
      - angles
    hint: A 90° angle has a square corner marker.
    figure:
      file: figures/level-2-q6-right-angle.svg
      alt: Two lines meeting to form a 90 degree angle with a right-angle square marker.
    options:
      - id: a
        text: Acute angle
      - id: b
        text: Obtuse angle
      - id: c
        text: Right angle
      - id: d
        text: Straight angle
    correctOptionId: c
  - id: level-2-q7
    prompt: A square playground has sides that are 6 meters long. What is its area?
    topicTags:
      - geometry
      - area
      - square
    hint: Area of a square = side × side.
    figure:
      file: figures/level-2-q7-square-area.svg
      alt: A square with each side labeled 6 meters.
    options:
      - id: a
        text: 12 m²
      - id: b
        text: 24 m²
      - id: c
        text: 36 m²
      - id: d
        text: 48 m²
    correctOptionId: c
  - id: level-2-q8
    prompt: A rectangular prism has length 4 cm, width 3 cm, and height 2 cm. What is its volume?
    topicTags:
      - measurement
      - volume
    hint: Volume = length × width × height.
    figure: null
    options:
      - id: a
        text: 9 cm³
      - id: b
        text: 12 cm³
      - id: c
        text: 18 cm³
      - id: d
        text: 24 cm³
    correctOptionId: d
  - id: level-2-q9
    prompt: What is the perimeter of this triangle?
    topicTags:
      - geometry
      - perimeter
      - triangle
    hint: Add all three side lengths.
    figure:
      file: figures/level-2-q9-triangle-perimeter.svg
      alt: A triangle with sides labeled 5 centimeters, 6 centimeters, and 7 centimeters.
    options:
      - id: a
        text: 13 cm
      - id: b
        text: 18 cm
      - id: c
        text: 21 cm
      - id: d
        text: 42 cm
    correctOptionId: b
  - id: level-2-q10
    prompt: A movie starts at 2:35 p.m. and ends at 4:10 p.m. How long is the movie?
    topicTags:
      - measurement
      - elapsed-time
    hint: Count from 2:35 to 3:35, then from 3:35 to 4:10.
    figure: null
    options:
      - id: a
        text: 1 hour 15 minutes
      - id: b
        text: 1 hour 25 minutes
      - id: c
        text: 1 hour 35 minutes
      - id: d
        text: 1 hour 45 minutes
    correctOptionId: c
